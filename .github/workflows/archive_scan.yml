name: Archive Scan Results
permissions:
  contents: write

on:
  workflow_run:
    workflows: ["Trust Scan Bot"]
    types:
      - completed

jobs:
  archive-scan:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Timestamp scan_results.json
        run: |
          if [ ! -f output/scan_results.json ]; then
            echo "output/scan_results.json not found, skipping archive"
            exit 0
          fi
          ts=$(date -u +'%Y-%m-%d_%H-%M-%S')
          mkdir -p archive
          cp output/scan_results.json archive/scan_results_${ts}.json

      - name: Configure Git
        run: |
          git config user.name "TrustBot"
          git config user.email "trustbot@travisryle.org"

      - name: Commit archive file
        run: |
          git add archive/
          git commit -m "Archive scan results at $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push || echo "Push skipped due to branch protection rules"
