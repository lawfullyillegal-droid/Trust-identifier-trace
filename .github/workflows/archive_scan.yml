name: Archive Scan Results
permissions:
  contents: write

on:
  workflow_run:
    workflows: ["Trust Scan Bot"]
    types:
      - completed

jobs:
  archive-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Timestamp scan_results.json
        run: |
          ts=$(date -u +'%Y-%m-%d_%H-%M-%S')
          mkdir -p archive
          cp output/scan_results.json archive/scan_results_${ts}.json
          echo "ARCHIVE_FILE=archive/scan_results_${ts}.json" >> "$GITHUB_ENV"

      - name: Verify archive output
        run: |
          [ -f "$ARCHIVE_FILE" ] || { echo "ERROR: Archive file $ARCHIVE_FILE not found. Aborting."; exit 1; }
          echo "✅ Archive output verified: $ARCHIVE_FILE"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ github.workflow }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: archive/

      - name: Configure Git
        run: |
          git config user.name "TrustBot"
          git config user.email "trustbot@travisryle.org"

      - name: Commit archive file
        run: |
          git add archive/
          git commit -m "Archive scan results at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push || echo "Push skipped due to branch protection rules"
