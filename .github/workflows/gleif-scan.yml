name: Daily GLEIF Scan + Overlay Injection
permissions:
  contents: write

on:
  schedule:
    - cron: '0 12 * * *'  # Runs daily at 12:00 UTC
  workflow_dispatch:

jobs:
  gleif-scan:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run GLEIF alias scan
        run: python gleif_alias_scan.py

      - name: Verify GLEIF output files
        run: |
          if (-not (Test-Path "gleif_results.xml") -or -not (Test-Path "trust_overlay.xml")) {
            Write-Error "ERROR: Both gleif_results.xml and trust_overlay.xml are required but one or both are missing. Aborting."
            exit 1
          }
          Write-Host "✅ GLEIF output files verified."

      - name: Upload GLEIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ github.workflow }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            gleif_results.xml
            trust_overlay.xml

      - name: Commit results
        run: |
          git config user.name "TrustBot"
          git config user.email "trustbot@travisryle.org"
          git add gleif_results.xml trust_overlay.xml
          git commit -m "Daily GLEIF scan + overlay update [$(Get-Date -Format 'yyyy-MM-dd_HH-mm-ss')]"
          git push origin main || Write-Host "Push skipped due to branch protection rules"
